{% extends "base.html" %}
{% block content %}
<h2>Dispatch Customers</h2>
<div class="toolbar" style="margin:8px 0 12px;">
  <a class="btn" href="/dispatch/create">← Back to Dispatch</a>
</div>
<form method="post" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
  <div><label>Customer Name</label><input type="text" name="customer_name" required></div>
  <div><label>GSTIN</label><input type="text" name="customer_gstin"></div>
  <div><label>Contact</label><input type="text" name="contact"></div>
  <div><label>Address</label><input type="text" name="customer_address"></div>
  <div style="grid-column:1/-1"><button class="btn" type="submit">Save Customer</button></div>
</form>
<table class="table">
  <tr><th>Customer</th><th>GSTIN</th><th>Contact</th><th>Address</th></tr>
  {% for r in rows %}
  <tr><td>{{ r.customer_name }}</td><td>{{ r.customer_gstin or '' }}</td><td>{{ r.contact or '' }}</td><td>{{ r.customer_address or '' }}</td></tr>
  {% endfor %}
</table>
{% endblock %}
