{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width:900px;margin:24px auto;padding:0 16px;">
  <h1>Opening Stock Upload</h1>
  <div style="background:#fff;padding:18px;border-radius:12px;border:1px solid #e5e7eb;">
    <p>Upload the filled opening stock Excel workbook.</p>
    <form method="post" enctype="multipart/form-data">
      <input type="file" name="file" accept=".xlsx" required style="margin:12px 0;display:block;"/>
      <button type="submit" class="btn-auth">Upload Excel</button>
    </form>
    <p style="margin-top:12px;color:#666;font-size:14px;">Blank date and lot no are auto-generated during import. Opening stock becomes usable stock immediately.</p>
  </div>
</div>
{% endblock %}
