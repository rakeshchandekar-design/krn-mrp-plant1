{% extends "base.html" %}
{% block content %}
<h2>Pulverization QA — {{ lot.lot_no }}</h2>
<form method="post">
  <label>Decision</label>
  <select name="decision"><option>PENDING</option><option>APPROVED</option><option>HOLD</option><option>REJECTED</option></select>
  <label>AD</label><input type="number" step="0.01" name="ad" value="{{ (qa.ad if qa else '') }}">
  <label>Non-Mag %</label><input type="number" step="0.01" name="non_mag_pct" value="{{ (qa.non_mag_pct if qa else lot.non_mag_pct) }}">
  <div class="grid-3">
    <div><label>+212</label><input name="p212" value="{{ pmap.get('p212','') }}"></div>
    <div><label>+180</label><input name="p180" value="{{ pmap.get('p180','') }}"></div>
    <div><label>-180+150</label><input name="n180p150" value="{{ pmap.get('n180p150','') }}"></div>
    <div><label>-150+75</label><input name="n150p75" value="{{ pmap.get('n150p75','') }}"></div>
    <div><label>-75+45</label><input name="n75p45" value="{{ pmap.get('n75p45','') }}"></div>
    <div><label>-45</label><input name="n45" value="{{ pmap.get('n45','') }}"></div>
  </div>
  <label>Remarks</label><textarea name="remarks">{{ qa.remarks if qa else '' }}</textarea>
  <button class="btn btn-primary">Save QA</button>
</form>
{% endblock %}
